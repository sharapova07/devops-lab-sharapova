site_name: Sharapova Elizaveta
site_description: Мой путь в DevOps: первые шаги и проекты
site_author: Sharapova Elizaveta
site_url: https://github.com/sharapova07/devops-lab-sharapova.git 

theme:
  name: material
  language: ru
  palette:
  - scheme: default
    primary: black
    accent: blue
  - scheme: slate
    primary: white
    accent: blue

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share

nav:
  - Главная: index.md
  - О себе: about.md
  - Проекты: projects.md
  - Контакты: contacts.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences  
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji

  arkdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
